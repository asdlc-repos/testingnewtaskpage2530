apiVersion: openchoreo.dev/v1alpha1
metadata:
  name: leave-web-app

endpoints:
  - name: http
    type: HTTP
    port: 9090
    basePath: /
    visibility:
      - external

dependencies:
  endpoints:
    - component: leave-management-service
      name: http
      visibility: project
      envBindings:
        address: LEAVE_MANAGEMENT_SERVICE_URL
